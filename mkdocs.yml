site_name: pgwerk
site_description: Postgres-backed job queue. Durable, visible, transactional.
site_url: https://pgwerk.github.io/pgwerk
repo_url: https://github.com/pgwerk/pgwerk
repo_name: pgwerk/pgwerk

theme:
  name: shadcn
  icon: assets/logo.svg
  favicon: assets/logo.svg

nav:
  - Home: index.md
  - Guide:
    - Quickstart: guide/quickstart.md
    - Enqueueing: guide/enqueueing.md
    - Workers: guide/workers.md
    - Cron: guide/cron.md
    - Serializers: guide/serializers.md
    - CLI: guide/cli.md
    - Dashboard: guide/dashboard.md
  - Reference:
    - App: reference/app.md
    - Workers: reference/workers.md
    - Schemas: reference/schemas.md
    - Exceptions: reference/exceptions.md
  - Changelog: changelog.md

markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - fenced_code
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - assets/lightbox.css

extra_javascript:
  - assets/lightbox.js
